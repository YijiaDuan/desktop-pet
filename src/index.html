<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>Desktop Pet</title>
<style>
  /* 透明壳 */
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    cursor: default;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei UI",
                 "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
  }
  /* 鹅默认贴在窗口左下角，菜单弹出后窗口横向加宽，鹅就被自然「让到左边」 */
  #pet-container {
    position: absolute;
    left: 10px; bottom: 0;
    width: 200px; height: 200px;
    cursor: grab;
  }
  #pet-container:active { cursor: grabbing; }

  /* 气泡（通用） */
  #bubble {
    position: absolute;
    background: #fff;
    border: 2px solid #333;
    border-radius: 16px;
    padding: 4px 10px;
    font-size: 16px; font-weight: 700;
    top: 0; left: 60%;
    opacity: 0;
    transform: translateY(10px) scale(0.8);
    transition: all .25s cubic-bezier(.5,1.6,.4,1);
    pointer-events: none;
    white-space: nowrap;
    z-index: 5;
  }
  #bubble.show { opacity: 1; transform: translateY(0) scale(1); }
  #bubble::after {
    content: ""; position: absolute; bottom: -10px; left: 16px;
    border: 8px solid transparent; border-top-color: #333;
  }

  /* 右键菜单（通用） */
  #menu {
    position: fixed; z-index: 1000;
    background: rgba(255,255,255,0.98);
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0 8px 28px rgba(0,0,0,.18);
    padding: 6px; min-width: 180px;
    display: none;
    font-size: 13px;
  }
  #menu.show { display: block; }
  #menu div {
    padding: 7px 12px; border-radius: 6px; cursor: pointer;
    white-space: nowrap;
  }
  #menu div:hover { background: #f0f4f8; }
  #menu div.disabled {
    color: #aaa; cursor: not-allowed;
  }
  #menu div.disabled:hover { background: transparent; }
  #menu div.checked { background: #eef5ff; }
  #menu .menu-head {
    padding: 4px 12px;
    color: #888;
    font-size: 11px;
    cursor: default;
  }
  #menu .menu-head:hover { background: transparent; }
  #menu hr { border: none; border-top: 1px solid #eee; margin: 4px 0; }
</style>

<!-- 宠物专属样式被 main.js 注入到这里 -->
<style id="pet-styles"></style>
</head>
<body>

<div id="pet-container">
  <div id="bubble"></div>
  <!-- 当前宠物的 SVG 由 main.js 注入 -->
</div>

<div id="menu"></div>

<script type="module" src="./main.js"></script>
</body>
</html>
